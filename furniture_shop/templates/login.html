{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Вход / Регистрация</h1>
        <p class="auth-subtitle">Войдите в аккаунт или создайте новый</p>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'success' %}message message-success{% else %}message message-error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" class="form-input" placeholder="Введите имя" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-input" placeholder="example@mail.ru" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" class="form-input" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="form-submit-btn">Войти / Зарегистрироваться</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'password_reset' %}" style="color: var(--primary); text-decoration: none; font-size: 14px;">
                🔑 Забыли пароль?
            </a>
        </div>
    </div>
</div>
{% endblock %}
