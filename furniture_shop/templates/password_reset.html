{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Восстановление пароля</h1>
        <p class="auth-subtitle">Введите email, указанный при регистрации</p>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'success' %}message message-success{% else %}message message-error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-input" placeholder="example@mail.ru" required>
            </div>
            <button type="submit" class="form-submit-btn">Восстановить пароль</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none;">
                ← Вернуться ко входу
            </a>
        </div>
    </div>
</div>
{% endblock %}
